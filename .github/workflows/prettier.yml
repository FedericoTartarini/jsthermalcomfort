name: Check Prettier

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Check prettier format
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - run: npm ci
      - run: npm run check:format
